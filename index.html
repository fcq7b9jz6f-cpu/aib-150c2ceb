<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">

  <link rel="icon" href="https://www.google.com/s2/favicons?domain=deepmind.google" type="image/x-icon">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&family=Noto+Sans+Mono:wght@400;600&display=swap" rel="stylesheet">

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css">

  <!-- ESM Import Map -->
  <script type="importmap">
  {"imports":{
    "react":"https://esm.sh/react@18.3.1",
    "react-dom":"https://esm.sh/react-dom@18.3.1",
    "react-dom/client":"https://esm.sh/react-dom@18.3.1/client",
    "react/jsx-runtime":"https://esm.sh/react@18.3.1/jsx-runtime",
    "react-router-dom":"https://esm.sh/react-router-dom@6.26.2?deps=react@18.3.1,react-dom@18.3.1",
    "framer-motion":"https://esm.sh/framer-motion@11.11.10?deps=react@18.3.1,react-dom@18.3.1",
    "lucide-react":"https://esm.sh/lucide-react@0.453.0?deps=react@18.3.1"
  }}
  </script>

  <!-- Sucrase JSX Transformer -->
   <script type="module">
     import { transform } from "https://esm.sh/sucrase@3.35.0?bundle";
     const src = await fetch("./app.jsx").then(r => r.text());
     const out = transform(src, { transforms: ["jsx","typescript"], jsxRuntime: "automatic", production: true }).code;
     const blob = URL.createObjectURL(new Blob([out], { type: "text/javascript" }));
     await import(blob);
   </script>
</head>
<body>
  <div id="root"></div>
</body>
</html>
